name: Build and Push Image

on:
  push:
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'post-install.sh'
      - 'entrypoint.sh'
      - 'new-certs.sh'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64
          push: true
          tags: ghcr.io/brentonthomson/cp-freeradius:latest
          build-args: |
            VERSION=3.2.8
            VERSION_UNDERSCORE=3_2_8
